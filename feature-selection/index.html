<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Selection Feature Page</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
  <h1>Feature Selection</h1>
  <div class="feature-card-container">
    <label for="cloud-storage" class="feature-card">
      <span class="title">Cloud Storage</span>
      <span class="description">100 Gigabyte secure storage</span>
      <input
        type="checkbox"
        id="cloud-storage"
        name="cloud-storage"
        checked
      />
    </label>
    <label for="dedicated-support" class="feature-card">
      <span class="title">Dedicated Support</span>
      <span class="description">24/7 costumer help</span>
      <input
        type="checkbox"
        id="dedicated-support"
        name="dedicated-support"
      />
    </label>
    <label for="advanced-analytics" class="feature-card">
      <span class="title">Advanced Analytics</span>
      <span class="description">Insights & reports</span>
      <input 
        type="checkbox"
        id="advanced-analytics"
        name="advanced-analytics"
      />
    </label>
    <label for="custom-user-themes" class="feature-card">
      <span class="title">Custom User Themes</span>
      <span class="description">Personalized dashboard design</span>
      <input 
        type="checkbox"
        id="custom-user-themes"
        name="custom-user-themes"
      />
    </label>
    <label for="multi-user-collab" class="feature-card">
      <span class="title">Multi-User Collab</span>
      <span class="description">Team access and sharing</span>
      <input 
        type="checkbox"
        id="multi-user-collab"
        name="multi-user-collab"
      />
    </label>
    <label for="api-access" class="feature-card">
      <span class="title">API Access</span>
      <span class="description">Integrate with your custom built tools</span>
      <input
        type="checkbox"
        id="api-access"
        name="api-access"
      />
    </label>
  </div>
</body>

</html>
