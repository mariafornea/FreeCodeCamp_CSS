<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ice Cream</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div class="ice-cream">
        <div class="ice-cream">
            <div class="ice-cream-body-back"></div>
            <div class="ice-cream-body-front">
                <div class="blick"></div>
                <div class="left-eye">
                    <div class="left-inner-eye"></div>
                </div>
                <div class="right-eye">
                    <div class="right-inner-eye"></div>
                </div>
                <div class="ice-cream-mouth"></div>
            </div>
            <div class="ice-cream-stick">
                <div class="ice-cream-stick-shadow"></div>
            </div>
        </div>
      </div>
    </main>
  </body>
