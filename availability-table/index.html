<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability Table</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <table>
        <thead>
            <tr scope="row" class="sharp">
                <th></th>
                <th scope="col">Time</th>
                <th scope="col" class="sharp">Monday</th>
                <th scope="col" class="sharp">Tuesday</th>
                <th scope="col" class="sharp">Wednesday</th>
                <th scope="col" class="sharp" class="sharp">Thursday</th>
                <th scope="col" class="sharp">Friday</th>
                <th scope="col" class="sharp">Saturday</th>
            </tr>
        </thead>
        <tbody>
            <tr class="half">
                <th></th>
                <th class="time"><time>06:00</time></th>
                <td class="available-1  half"></td>
                <td class="available-0  half"></td>
                <td class="available-2  half"></td>
                <td class="available-1  half"></td>
                <td class="available-4  half"></td>
                <td class="available-5  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>07:00</time></th>
                <td class="available-0  half"></td>
                <td class="available-3  half"></td>
                <td class="available-1  half"></td>
                <td class="available-2  half"></td>
                <td class="available-2  half"></td>
                <td class="available-1  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>08:00</time></th>
                <td class="available-1  half"></td>
                <td class="available-2  half"></td>
                <td class="available-0  half"></td>
                <td class="available-4  half"></td>
                <td class="available-3  half"></td>
                <td class="available-1  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>09:00</time></th>
                <td class="available-0  half"></td>
                <td class="available-5  half"></td>
                <td class="available-1  half"></td>
                <td class="available-3  half"></td>
                <td class="available-4  half"></td>
                <td class="available-2  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>10:00</time></th>
                <td class="available-2  half"></td>
                <td class="available-1  half"></td>
                <td class="available-4  half"></td>
                <td class="available-5  half"></td>
                <td class="available-3  half"></td>
                <td class="available-0  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>11:00</time></th>
                <td class="available-3  half"></td>
                <td class="available-4  half"></td>
                <td class="available-0  half"></td>
                <td class="available-5  half"></td>
                <td class="available-1  half"></td>
                <td class="available-1  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>12:00</time></th>
                <td class="available-1  half"></td>
                <td class="available-5  half"></td>
                <td class="available-4  half"></td>
                <td class="available-0  half"></td>
                <td class="available-2  half"></td>
                <td class="available-3  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>13:00</time></th>
                <td class="available-1  half"></td>
                <td class="available-1  half"></td>
                <td class="available-3  half"></td>
                <td class="available-5  half"></td>
                <td class="available-0  half"></td>
                <td class="available-2  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>14:00</time></th>
                <td class="available-4  half"></td>
                <td class="available-0  half"></td>
                <td class="available-1  half"></td>
                <td class="available-1  half"></td>
                <td class="available-5  half"></td>
                <td class="available-3  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>15:00</time></th>
                <td class="available-0  half"></td>
                <td class="available-1  half"></td>
                <td class="available-2  half"></td>
                <td class="available-3  half"></td>
                <td class="available-5  half"></td>
                <td class="available-4  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>16:00</time></th>
                <td class="available-1  half"></td>
                <td class="available-3  half"></td>
                <td class="available-4  half"></td>
                <td class="available-2  half"></td>
                <td class="available-2  half"></td>
                <td class="available-0  half"></td>
            </tr>
            <tr class="half">
                <th></th>
                <th class="time"><time>17:00</time></th>
                <td class="available-5 half"></td>
                <td class="available-2 half"></td>
                <td class="available-1 half"></td>
                <td class="available-0 half"></td>
                <td class="available-4 half"></td>
                <td class="available-3 half"></td>
            </tr>
            <tr class="sharp">
                <th></th>
                <th class="time"><time>18:00</time></th>
                <td class="available-4 sharp"></td>
                <td class="available-3 sharp"></td>
                <td class="available-5 sharp"></td>
                <td class="available-2 sharp"></td>
                <td class="available-0 sharp"></td>
                <td class="available-1 sharp"></td>
            </tr>
        </tbody>
    </table>
    <div id="legend">
        <span>Availability</span>
        <div id="legend-gradient"></div>
    </div>
</body>

</html>
