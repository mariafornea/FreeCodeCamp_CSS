<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Painting</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="house">
    <div id="chimney">
        <div class="chimney-line-horizontal-1"></div>
        <div class="chimney-line-horizontal-2"></div>
        <div class="chimney-line-vertical-1"></div>
        <div class="chimney-line-vertical-2"></div>
    </div>
    <div id="roof"></div>
    <div id="window-1">
        <div class="window-1-top-lines">
            <div class="w1-tl-1"></div>
            <div class="w1-tl-2"></div>
            <div class="w1-tl-3"></div>
        </div>
        <div class="window-1-center-line"></div>
        <div class="window-1-bottom-lines">
            <div class="w1-bl-1"></div>
            <div class="w1-bl-2"></div>
            <div class="w1-bl-3"></div>
        </div>
    </div>
    <div id="window-2">
        <div class="window-2-top-lines">
            <div class="w2-tl-1"></div>
            <div class="w2-tl-2"></div>
            <div class="w2-tl-3"></div>
        </div>
        <div class="window-2-center-line"></div>
        <div class="window-2-bottom-lines">
            <div class="w2-bl-1"></div>
            <div class="w2-bl-2"></div>
            <div class="w2-bl-3"></div>
        </div>
    </div>
    <div id="door">
        <div class="door-window">
            <div class="door-window-line1"></div>
            <div class="door-window-line2"></div>
        </div>
        <div class="door-handle"></div>
    </div>
  </div>
</body>
</html>
